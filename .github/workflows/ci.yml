name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install pytest genlayer-py ruff
      - name: Lint contracts and SDK
        run: ruff check contracts/ sdk/ --ignore E501,E701,E722,E741,F403,F405
      - name: Run tests
        run: python -m pytest tests/ -q

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install and build
        run: cd frontend && npm install && npx vite build
